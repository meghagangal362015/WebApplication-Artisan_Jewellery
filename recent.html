<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recently Visited Products | Artisan Jewelry by Megha</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">Artisan Jewelry <span>by Megha</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="products.html">Products & Services</a></li>
                    <li><a href="news.html">News</a></li>
                    <li><a href="contact.php">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="page-title">
        <div class="container">
            <h1>Last 5 Visited Products</h1>
        </div>
    </section>

    <main>
        <div class="container">
            <div class="content-section">
                <p>Your most recently viewed product pages will appear below. Click any name to open the product again.</p>
                <ul id="recent-list"></ul>
                <p><a href="products.html">Back to Products</a></p>
            </div>
        </div>
    </main>

    <script src="cookies.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var recent = getRecentProducts();
            var list = document.getElementById("recent-list");

            if (!recent || recent.length === 0) {
                var li = document.createElement("li");
                li.textContent = "You have not visited any product pages yet.";
                list.appendChild(li);
                return;
            }

            recent.forEach(function (item) {
                var li = document.createElement("li");
                var link = document.createElement("a");
                // product IDs are like "product1", "product2", etc.
                link.href = item.id + ".html";
                link.textContent = item.name || item.id;
                li.appendChild(link);
                list.appendChild(li);
            });
        });
    </script>
</body>
</html>
